# Docker Compose cho n8n với auto-patch license
# So với bản gốc, chỉ thêm 3 thay đổi (đánh dấu # PATCH)

services:
  n8n_dtp:
    image: n8nio/n8n:${VERSION}
    user: root
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
    restart: always
    ports:
      - ${HOST_IP}:${WEB_HTTP_PORT}:5678
    volumes:
      - ${APP_PATH}/data:/home/node/.n8n
      - ${APP_PATH}/patch-license.sh:/patch-license.sh:ro  # PATCH: mount script
    entrypoint: ["tini", "--", "sh", "/patch-license.sh"]    # PATCH: custom entrypoint
    # command không cần vì script sẽ gọi /docker-entrypoint.sh
    env_file:
      - .env
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true
